<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steven Putra Tjhin – Portofolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #FFFFFF;
  --bg-alt: #F4F7F5;
  --green-dark: #0D3321;
  --green-mid: #1A5C3A;
  --green-accent: #2A7A52;
  --green-light: #4A9A72;
  --green-pale: #E6F0EB;
  --text-main: #0D3321;
  --text-body: #2B4938;
  --text-muted: #587060;
  --border: #D2E2DA;
  --white: #FFFFFF;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-body); overflow-x: hidden; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 60px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--green-mid); letter-spacing: 2.5px; text-transform: uppercase; }
.nav-links { display: flex; gap: 28px; list-style: none; }
.nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--green-mid); }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex; align-items: center;
  padding: 110px 60px 80px;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 40%;
  background: var(--green-pale);
  clip-path: polygon(12% 0, 100% 0, 100% 100%, 0% 100%);
  z-index: 0;
}
.hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; max-width: 1160px; width: 100%; position: relative; z-index: 1; }
.hero-left { display: flex; gap: 32px; align-items: flex-start; }
.photo-ring {
  flex-shrink: 0; width: 148px; height: 148px;
  border-radius: 50%; overflow: hidden;
  border: 3px solid var(--green-mid);
  box-shadow: 0 6px 24px rgba(14,54,33,0.18);
  margin-top: 6px;
}
.photo-ring img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.hero-text {}
.eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--green-accent); text-transform: uppercase; margin-bottom: 18px; }
.hero-name { font-family: 'Playfair Display', serif; font-size: clamp(34px, 4vw, 60px); font-weight: 900; line-height: 1.05; color: var(--green-dark); margin-bottom: 14px; }
.hero-name span { color: var(--green-mid); }
.hero-sub { font-size: 14px; color: var(--text-muted); line-height: 1.75; margin-bottom: 8px; }
.hero-sub a { color: var(--green-mid); text-decoration: none; }
.hero-ctas { display: flex; gap: 14px; margin-top: 28px; flex-wrap: wrap; }
.btn-p { background: var(--green-mid); color: #fff; padding: 12px 26px; border-radius: 4px; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.2s, transform 0.15s; display: inline-block; }
.btn-p:hover { background: var(--green-dark); transform: translateY(-1px); }
.btn-o { background: transparent; color: var(--green-mid); padding: 11px 24px; border: 1.5px solid var(--green-mid); border-radius: 4px; font-size: 14px; font-weight: 500; text-decoration: none; transition: background 0.2s; display: inline-block; }
.btn-o:hover { background: var(--green-pale); }

.hero-cards { display: flex; flex-direction: column; gap: 18px; position: relative; z-index: 1; }
.hcard { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(14,54,33,0.06); transition: border-color 0.2s, box-shadow 0.2s; }
.hcard:hover { border-color: var(--green-mid); box-shadow: 0 4px 16px rgba(27,94,59,0.12); }
.hcard-num { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--green-mid); }
.hcard-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }

/* SECTIONS */
.section-wrap { padding: 80px 60px; max-width: 1160px; margin: 0 auto; }
.section-alt { background: var(--bg-alt); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.section-alt .section-wrap { max-width: 100%; }
.section-dark { background: var(--green-dark); }
.section-dark .section-wrap { max-width: 100%; }
.s-eye { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--green-accent); text-transform: uppercase; margin-bottom: 10px; }
.s-title { font-family: 'Playfair Display', serif; font-size: clamp(26px, 3vw, 38px); font-weight: 700; line-height: 1.2; color: var(--green-dark); margin-bottom: 14px; }
.divider { width: 44px; height: 2px; background: var(--green-mid); margin-bottom: 44px; }

/* EXPERTISE */
.exp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.exp-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 26px; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; }
.exp-card:hover { border-color: var(--green-mid); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(27,94,59,0.1); }
.exp-icon { width: 38px; height: 38px; background: var(--green-pale); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; margin-bottom: 14px; }
.exp-card h3 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; margin-bottom: 9px; color: var(--green-dark); }
.exp-card p { font-size: 13px; color: var(--text-muted); line-height: 1.65; }

/* RESUME */
.res-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; }
.res-col h3 { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2.5px; color: var(--green-accent); text-transform: uppercase; margin-bottom: 28px; padding-bottom: 12px; border-bottom: 1.5px solid var(--border); }
.timeline { display: flex; flex-direction: column; }
.titem { position: relative; padding-left: 22px; padding-bottom: 26px; border-left: 1.5px solid var(--border); }
.titem:last-child { border-left-color: transparent; }
.titem::before { content: ''; position: absolute; left: -5px; top: 6px; width: 9px; height: 9px; background: var(--green-mid); border-radius: 50%; }
.t-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green-accent); letter-spacing: 1px; margin-bottom: 4px; }
.t-title { font-weight: 600; font-size: 14px; color: var(--green-dark); margin-bottom: 2px; }
.t-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 7px; }
.t-bullets { font-size: 13px; color: var(--text-muted); line-height: 1.65; list-style: none; }
.t-bullets li { position: relative; padding-left: 12px; margin-bottom: 4px; }
.t-bullets li::before { content: '–'; position: absolute; left: 0; color: var(--green-mid); }

/* ORG */
.org-list { display: flex; flex-direction: column; gap: 18px; }
.ocard { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 22px 26px; transition: border-color 0.2s, box-shadow 0.2s; }
.ocard:hover { border-color: var(--green-mid); box-shadow: 0 4px 16px rgba(27,94,59,0.1); }
.ocard-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.ocard-title { font-weight: 600; font-size: 14px; color: var(--green-dark); }
.ocard-org { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.ocard-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green-accent); white-space: nowrap; margin-left: 14px; padding-top: 2px; }
.ocard-bullets { font-size: 13px; color: var(--text-muted); line-height: 1.65; list-style: none; }
.ocard-bullets li { position: relative; padding-left: 12px; margin-bottom: 4px; }
.ocard-bullets li::before { content: '–'; position: absolute; left: 0; color: var(--green-mid); }

/* SKILLS */
.sk-wrap { display: grid; grid-template-columns: repeat(2, 1fr); gap: 36px; }
.sk-group h4 { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--green-light); text-transform: uppercase; margin-bottom: 14px; }
.sk-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.sk-tag { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); font-size: 13px; padding: 6px 14px; border-radius: 20px; transition: background 0.2s; }
.sk-tag:hover { background: rgba(255,255,255,0.16); }
.section-dark .s-eye { color: var(--green-light); }
.section-dark .s-title { color: #fff; }
.section-dark .divider { background: var(--green-light); }

/* CONTACT */
.contact-inner { text-align: center; }
.contact-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 36px; line-height: 1.7; }
.contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 680px; margin: 0 auto; }
.ccard { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; padding: 20px 16px; text-decoration: none; color: inherit; transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s; display: flex; flex-direction: column; align-items: center; gap: 9px; }
.ccard:hover { border-color: var(--green-mid); box-shadow: 0 4px 16px rgba(27,94,59,0.1); transform: translateY(-2px); }
.ccard-icon { width: 42px; height: 42px; background: var(--green-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.ccard-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--green-accent); text-transform: uppercase; }
.ccard-val { font-size: 13px; color: var(--text-body); font-weight: 500; text-align: center; word-break: break-all; }

footer { text-align: center; padding: 24px 60px; background: var(--green-dark); font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }

@media (max-width: 900px) {
  nav { padding: 14px 20px; }
  .nav-links { display: none; }
  .hero { padding: 96px 20px 60px; }
  .hero-inner { grid-template-columns: 1fr; gap: 36px; }
  .hero-left { flex-direction: column; }
  .hero::after { display: none; }
  .section-wrap { padding: 56px 20px; }
  .exp-grid { grid-template-columns: 1fr; }
  .res-cols { grid-template-columns: 1fr; gap: 36px; }
  .sk-wrap { grid-template-columns: 1fr; }
  .contact-grid { grid-template-columns: 1fr; max-width: 300px; }
  footer { padding: 20px; }
}
</style>
